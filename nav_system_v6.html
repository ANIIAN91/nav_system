<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ANIAN / nav_system — 极简版 v6</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background: #0a0a0a;
      font-family: 'Outfit', system-ui, sans-serif;
      color: #c8c8c8;
      padding: 40px 20px;
      min-height: 100vh;
    }

    .frame {
      background: #0f0f0f;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 25px 60px -15px rgb(0 0 0 / 0.6);
      max-width: 1100px;
      margin: 0 auto;
      border: 0.5px solid #1f1f1f;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      height: 56px;
      border-bottom: 0.5px solid #222;
      background: #141414;
    }

    .logo {
      font-family: 'Lora', serif;
      font-size: 19px;
      color: #e8d5a0;
      letter-spacing: -0.4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .logo span { color: #555; font-style: italic; font-size: 13px; }

    .topnav { display: flex; gap: 4px; }
    .tnav {
      font-size: 12px;
      color: #5a5a5a;
      padding: 6px 14px;
      border-radius: 7px;
      cursor: pointer;
      transition: all 0.15s cubic-bezier(0.23, 1, 0.32, 1);
      border: 0.5px solid transparent;
      font-family: 'JetBrains Mono', monospace;
    }
    .tnav.active, .tnav:hover {
      color: #e8d5a0;
      background: #1e1e1e;
      border-color: #2e2e2e;
    }

    .topright { display: flex; align-items: center; gap: 12px; }

    .search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #1a1a1a;
      border: 0.5px solid #2a2a2a;
      border-radius: 9px;
      padding: 6px 14px;
      transition: border-color 0.2s;
    }
    .search-box:focus-within { border-color: #d4a84b40; }
    .search-box input {
      background: none;
      border: none;
      outline: none;
      color: #8a8a8a;
      font-size: 12.5px;
      font-family: 'JetBrains Mono', monospace;
      width: 220px;
    }
    .search-box .ic { color: #3a3a3a; font-size: 13px; }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: linear-gradient(135deg, #d4a84b, #8a6520);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: #0f0f0f;
      box-shadow: 0 0 0 2px #1a1400;
    }

    .main {
      padding: 32px 40px;
      background: #0f0f0f;
    }

    .hero-card-placeholder { display: none; }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 14px;
      margin-bottom: 30px;
    }

    .article-card {
      background: #141414;
      border: 0.5px solid #1e1e1e;
      border-radius: 11px;
      padding: 20px 20px 18px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.23, 1, 0.32, 1);
      position: relative;
      overflow: hidden;
    }
    .article-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2.5px;
      background: transparent;
      transition: background 0.25s;
    }
    .article-card:hover {
      border-color: #2a2a2a;
      transform: translateY(-2px);
      box-shadow: 0 8px 25px -8px rgb(0 0 0 / 0.3);
    }
    .article-card:hover::before { background: #d4a84b; }
    .card-cat {
      font-size: 9px;
      font-family: 'JetBrains Mono', monospace;
      color: #5a5a5a;
      text-transform: uppercase;
      letter-spacing: 1.6px;
      margin-bottom: 9px;
    }
    .card-title {
      font-family: 'Lora', serif;
      font-size: 14.5px;
      line-height: 1.45;
      color: #b8b0a0;
      margin-bottom: 10px;
      font-weight: 600;
    }
    .card-title em { font-style: italic; color: #d4a84b; }
    .card-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 14px;
    }
    .card-date {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: #3a3a3a;
    }
    .card-read {
      font-size: 9.5px;
      font-family: 'JetBrains Mono', monospace;
      color: #d4a84b30;
      background: #1a1400;
      padding: 2px 7px;
      border-radius: 3px;
    }

    .links-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
      gap: 11px;
      margin-bottom: 20px;
    }
    .link-card {
      background: #141414;
      border: 0.5px solid #1e1e1e;
      border-radius: 9px;
      padding: 14px 15px;
      cursor: pointer;
      transition: all 0.15s cubic-bezier(0.23, 1, 0.32, 1);
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .link-card:hover {
      background: #161616;
      border-color: #2a2a2a;
      transform: translateY(-1px);
    }
    .link-icon {
      width: 30px;
      height: 30px;
      border-radius: 7px;
      background: #1a1a1a;
      border: 0.5px solid #252525;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11.5px;
      color: #5a5a5a;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
    }
    .link-info .link-name {
      font-size: 12.5px;
      color: #9a9a9a;
      font-weight: 500;
      margin-bottom: 1px;
    }
    .link-info .link-url {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: #3a3a3a;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 20px;
    }
    .modal.show { display: flex; }
    .modal-content {
      background: #111;
      border-radius: 14px;
      width: 100%;
      max-width: 820px;
      max-height: 92vh;
      overflow: hidden;
      border: 0.5px solid #2a2a2a;
      box-shadow: 0 30px 70px -15px rgb(0 0 0 / 0.7);
    }
    .modal-header {
      padding: 18px 26px;
      border-bottom: 0.5px solid #1e1e1e;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-title {
      font-family: 'Lora', serif;
      font-size: 17px;
      color: #d8d0c0;
    }
    .modal-close {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      font-size: 20px;
      cursor: pointer;
      transition: color 0.15s;
    }
    .modal-close:hover { color: #d4a84b; }
    .modal-body {
      padding: 28px 32px;
      max-height: 65vh;
      overflow-y: auto;
      line-height: 1.75;
      font-size: 14.5px;
      color: #a8a8a8;
    }
    .modal-body h2 { font-family: 'Lora', serif; color: #d8d0c0; margin: 18px 0 10px; font-size: 19px; }
    .modal-body p { margin-bottom: 14px; }
    .modal-body pre {
      background: #0a0a0a;
      padding: 14px;
      border-radius: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12.5px;
      overflow-x: auto;
      border: 0.5px solid #1e1e1e;
    }
    .modal-footer {
      padding: 16px 26px;
      border-top: 0.5px solid #1e1e1e;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
    .btn {
      font-size: 12px;
      padding: 7px 16px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'JetBrains Mono', monospace;
    }
    .btn-ghost {
      background: transparent;
      border: 0.5px solid #2a2a2a;
      color: #5a5a5a;
    }
    .btn-ghost:hover { border-color: #d4a84b; color: #d4a84b; }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="frame">
    <!-- Top Bar -->
    <div class="topbar">
      <div class="logo">ANIAN <span>/ nav_system</span></div>
      
      <div class="topnav">
        <div class="tnav active" data-view="home">文章</div>
        <div class="tnav" data-view="nav">导航</div>
        <div class="tnav" data-view="archive">归档</div>
        <div class="tnav" data-view="about">关于</div>
      </div>

      <div class="topright">
        <div class="search-box">
          <span class="ic">⌕</span>
          <input type="text" id="search-input" placeholder="搜索文章或链接…" />
          <span class="ic" style="color:#2a2a2a;font-family:'JetBrains Mono',monospace;font-size:10px">⌘K</span>
        </div>
        <div class="avatar">AN</div>
      </div>
    </div>

    <!-- Main Content (无侧边栏，极简) -->
    <div class="main">
      <!-- Articles View -->
      <div id="articles-view">
        <div class="card-grid" id="article-grid"></div>
      </div>

      <!-- Navigation View -->
      <div id="nav-view" class="hidden">
        <div class="links-grid" id="links-grid"></div>
      </div>
    </div>
  </div>

  <!-- Article Modal -->
  <div class="modal" id="article-modal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title" id="modal-article-title"></div>
        <div class="modal-close" onclick="closeModal()">&times;</div>
      </div>
      <div class="modal-body" id="modal-article-body">
        <!-- Dynamic content -->
      </div>
      <div class="modal-footer">
        <div class="btn btn-ghost" onclick="closeModal()">关闭</div>
      </div>
    </div>
  </div>

  <script>
    const articles = [
      { id: 0, cat: "技术", title: "用 Rust 重写我的构建工具链——四个月后的反思", desc: "从 Node.js 迁移到 Rust，踩过的坑，收获的教训。", date: "2025-11-12", read: "3,200 字",
        content: `<h2>背景</h2><p>2025 年初，我决定把一个用了 4 年的 Node.js 构建工具链全部用 Rust 重写。</p><h2>收获</h2><ul><li>构建速度提升 <strong>8~12 倍</strong></li><li>内存占用下降 70%</li></ul>` },
      { id: 1, cat: "设计", title: "设计系统的熵：为什么组件库会越来越混乱", desc: "组件库在迭代过程中如何失控。", date: "2025-11-08", read: "2.1k 字",
        content: `<h2>熵的定义</h2><p>在设计系统中，熵代表着混乱和不可预测性。</p>` },
      { id: 2, cat: "技术", title: "终端美学：打造一套顺手的 CLI 工作流", desc: "从 zsh + starship 到 wezterm + tmux 的完整配置。", date: "2025-10-31", read: "1.8k 字",
        content: `<h2>核心工具</h2><p>wezterm + zellij + starship + fzf 构成了我的日常工作流。</p>` },
      { id: 3, cat: "随笔", title: "读《禅与摩托车维修艺术》：质量是什么", desc: "这本书教会我的不只是维修，更是思考方式。", date: "2025-10-20", read: "980 字",
        content: `<p>质量不是一个客观属性，而是一种「关系」。</p>` }
    ];

    const links = [
      { id: 1, icon: "GH", name: "GitHub", url: "github.com", group: "dev" },
      { id: 2, icon: "CF", name: "Cloudflare", url: "dash.cloudflare.com", group: "dev" },
      { id: 3, icon: "FG", name: "Figma", url: "figma.com", group: "design" },
      { id: 4, icon: "VS", name: "VS Code", url: "vscode.dev", group: "dev" },
      { id: 5, icon: "📚", name: "MDN Web Docs", url: "developer.mozilla.org", group: "learn" },
      { id: 6, icon: "⚡", name: "Vercel", url: "vercel.com", group: "dev" }
    ];

    let linksRendered = false;

    function renderArticles(filteredArticles = articles) {
      const container = document.getElementById('article-grid');
      container.innerHTML = '';
      filteredArticles.forEach(article => {
        const card = document.createElement('div');
        card.className = 'article-card';
        card.innerHTML = `
          <div class="card-cat">${article.cat}</div>
          <div class="card-title">${article.title}</div>
          <div class="card-foot">
            <div class="card-date">${article.date}</div>
            <div class="card-read">${article.read}</div>
          </div>
        `;
        card.onclick = () => openArticleModal(article.id);
        container.appendChild(card);
      });
    }

    function renderLinks(filteredLinks = links) {
      const container = document.getElementById('links-grid');
      container.innerHTML = '';
      filteredLinks.forEach(link => {
        const card = document.createElement('div');
        card.className = 'link-card';
        card.innerHTML = `
          <div class="link-icon">${link.icon}</div>
          <div class="link-info">
            <div class="link-name">${link.name}</div>
            <div class="link-url">${link.url}</div>
          </div>
        `;
        card.onclick = () => {
          card.style.transform = 'scale(0.97)';
          setTimeout(() => { card.style.transform = 'scale(1)'; alert(`已打开 ${link.name}（模拟）`); }, 120);
        };
        container.appendChild(card);
      });
    }

    function initTopNav() {
      const articlesView = document.getElementById('articles-view');
      const navView = document.getElementById('nav-view');

      document.querySelectorAll('.tnav').forEach(nav => {
        nav.addEventListener('click', () => {
          document.querySelectorAll('.tnav').forEach(n => n.classList.remove('active'));
          nav.classList.add('active');
          const view = nav.dataset.view;

          if (view === 'nav') {
            articlesView.classList.add('hidden');
            navView.classList.remove('hidden');
            if (!linksRendered) { renderLinks(); linksRendered = true; }
          } else if (view === 'home') {
            articlesView.classList.remove('hidden');
            navView.classList.add('hidden');
          } else {
            alert(`「${nav.textContent}」页面开发中...`);
          }
        });
      });
    }

    function initSearch() {
      const input = document.getElementById('search-input');
      input.addEventListener('input', () => {
        const term = input.value.toLowerCase().trim();
        const filteredArticles = articles.filter(a =>
          a.title.toLowerCase().includes(term) || a.desc.toLowerCase().includes(term) || a.cat.toLowerCase().includes(term)
        );
        renderArticles(filteredArticles);

        const navView = document.getElementById('nav-view');
        if (!navView.classList.contains('hidden')) {
          const filteredLinks = links.filter(l => l.name.toLowerCase().includes(term) || l.url.toLowerCase().includes(term));
          renderLinks(filteredLinks);
        }
      });

      document.addEventListener('keydown', (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
          e.preventDefault();
          input.focus();
          input.select();
        }
      });
    }

    function openArticleModal(id) {
      const article = articles.find(a => a.id === id);
      if (!article) return;
      document.getElementById('modal-article-title').innerHTML = article.title;
      document.getElementById('modal-article-body').innerHTML = article.content;
      const modal = document.getElementById('article-modal');
      modal.style.display = 'flex';
      modal.classList.add('show');
    }

    function closeModal() {
      const modal = document.getElementById('article-modal');
      modal.style.display = 'none';
      modal.classList.remove('show');
    }

    function init() {
      renderArticles();
      initTopNav();
      initSearch();
      document.querySelector('.logo').addEventListener('click', () => renderArticles());
    }

    window.onload = init;
  </script>
</body>
</html>
